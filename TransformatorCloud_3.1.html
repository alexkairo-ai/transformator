<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Алексей — Трансформатор 3.3 (5 приёмов, автоподбор продуктов)</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0B1120 0%,#19212E 100%);color:#E8EDF5;padding:1rem;min-height:100vh}
        .container{max-width:1400px;margin:0 auto}
        .header{margin-bottom:1.5rem;text-align:center}
        .header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#FFF,#A5B9FF);-webkit-background-clip:text;background-clip:text;color:transparent}
        .dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.2rem;margin-bottom:1.2rem}
        .card{background:rgba(22,32,48,0.85);backdrop-filter:blur(2px);border-radius:28px;padding:1.2rem;border:1px solid rgba(72,92,120,0.3)}
        .card-title{font-size:1.3rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px;border-left:4px solid #5D9BFF;padding-left:12px}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;margin:10px 0}
        .cal-day{background:#1E2A3A;padding:8px 4px;border-radius:40px;cursor:pointer;font-size:.85rem}
        .cal-day.selected{background:#5D9BFF}
        .task-list{max-height:150px;overflow-y:auto;margin:10px 0}
        .task-item{display:flex;align-items:center;gap:8px;background:#111A26;padding:6px 12px;border-radius:60px;margin-bottom:6px}
        .task-item.completed .task-text{text-decoration:line-through;opacity:.6}
        .task-text{flex:1;font-size:.85rem}
        .add-task-form{display:flex;gap:8px;margin-top:8px}
        .add-task-form input{flex:1;background:#0F1622;border:1px solid #2E3D52;padding:8px;border-radius:40px;color:#fff}
        .add-task-form button{background:#5D9BFF;border:none;padding:0 16px;border-radius:40px;color:#fff;cursor:pointer}
        
        .food-search-row{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;position:relative}
        .food-search-row input{flex:2;background:#0F1622;border:1px solid #2E3D52;padding:8px;border-radius:40px;color:#fff}
        .food-search-row button{background:#5D9BFF;border:none;padding:0 16px;border-radius:40px;cursor:pointer}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#1E2A3A;border-radius:20px;z-index:10;max-height:150px;overflow-y:auto}
        .autocomplete-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid #2E3D52}
        .autocomplete-item:hover{background:#2E3D52}
        .food-list{max-height:200px;overflow-y:auto;margin:10px 0}
        .food-item{display:flex;justify-content:space-between;align-items:center;background:#1E2A3A;padding:5px 10px;border-radius:30px;margin-bottom:4px}
        .food-info{flex:1;font-size:.85rem}
        .food-edit,.food-delete{background:0 0;border:none;color:#FFB347;cursor:pointer;margin-left:6px}
        .total-calories{font-weight:700;background:#2E3D52;padding:8px;border-radius:40px;text-align:center;margin:8px 0}
        
        .tracker-input{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
        .tracker-input input,.tracker-input select{flex:1;background:#0F1622;border:1px solid #2E3D52;padding:8px;border-radius:40px;color:#fff}
        .tracker-input button{background:#5D9BFF;border:none;padding:0 16px;border-radius:40px}
        canvas{max-height:180px;margin-top:10px}
        
        .meal-plan-grid{max-height:500px;overflow-y:auto;margin:10px 0}
        .day-plan{background:#0F1622;border-radius:20px;padding:10px;margin-bottom:12px}
        .day-title{color:#FFB347;font-weight:700;margin-bottom:6px}
        .meal-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0;background:#1E2A3A;padding:5px 10px;border-radius:40px}
        .meal-name{flex:1}
        .meal-edit{background:0 0;border:none;color:#5D9BFF;cursor:pointer;margin-left:8px}
        .generate-plan-btn{background:#5D9BFF;border:none;padding:12px;border-radius:60px;width:100%;margin-top:8px;font-weight:700;cursor:pointer}
        .advice-box{background:#0F1622;padding:1rem;border-radius:24px;margin-top:8px}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:#1E2A3A;border-radius:28px;padding:1.5rem;width:90%;max-width:500px}
        .modal-content input,.modal-content select{width:100%;margin:8px 0;padding:8px;border-radius:40px;border:none;background:#0F1622;color:#fff}
        .modal-content button{margin-top:12px;background:#5D9BFF;border:none;padding:8px;border-radius:40px;cursor:pointer}
        @media(min-width:768px){body{padding:2rem}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-cloud-sun"></i> Трансформатор 3.3</h1>
        <p>5 приёмов пищи | Личная база продуктов | Ввод данных за любую дату</p>
        <div id="authStatus" style="font-size:0.7rem; margin-top:5px;">Подключение...</div>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> Задачи</div>
            <div id="calendarWidget"></div>
            <div id="taskList" class="task-list"></div>
            <div class="add-task-form">
                <input type="text" id="newTaskText" placeholder="Новая задача">
                <button id="addTaskBtn"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-calculator"></i> Калькулятор калорий</div>
            <div class="food-search-row">
                <input type="text" id="foodSearchInput" placeholder="Поиск (из вашей базы или интернет)" autocomplete="off">
                <button id="searchFoodBtn"><i class="fas fa-search"></i> Найти</button>
                <div id="autocompleteList" class="autocomplete-list" style="display:none"></div>
            </div>
            <div id="searchResults" style="font-size:0.8rem; margin-bottom:8px;"></div>
            <div id="foodList" class="food-list"></div>
            <div id="totalCalories" class="total-calories">🔥 0 ккал</div>
            <button id="addCustomProductBtn" class="suggest-recipe-btn" style="background:#2E3D52;"><i class="fas fa-plus"></i> Добавить свой продукт</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Вес и шаги</div>
            <div class="tracker-input">
                <input type="date" id="trackerDate" value="">
                <input type="number" id="weightInput" placeholder="Вес (кг)" step="0.1">
                <input type="number" id="stepsInput" placeholder="Шаги">
                <button id="logDataBtn"><i class="fas fa-save"></i> Записать</button>
            </div>
            <canvas id="progressChart" width="400" height="180"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom:1.2rem">
        <div class="card-title"><i class="fas fa-calendar-week"></i> План питания (5 приёмов)</div>
        <div id="weeklyMealPlan" class="meal-plan-grid"></div>
        <button id="generateMealPlanBtn" class="generate-plan-btn"><i class="fas fa-magic"></i> Сгенерировать меню на эту неделю</button>
        <div style="margin-top:8px; text-align:center">
            <button id="prevWeekBtn" style="background:#2E3D52; border:none; padding:6px 12px; border-radius:40px;">◀ Пред. неделя</button>
            <span id="weekRange" style="margin:0 12px;">Текущая неделя</span>
            <button id="nextWeekBtn" style="background:#2E3D52; border:none; padding:6px 12px; border-radius:40px;">След. неделя ▶</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-brain"></i> Совет дня</div>
        <div class="advice-box" id="dailyAdvice"></div>
        <button id="refreshAdvice" style="margin-top:12px; background:#2E3D52; border:none; padding:8px; border-radius:60px; width:100%; cursor:pointer;">🔄 Другой совет</button>
    </div>
</div>

<!-- Модалка для продукта -->
<div id="foodEditModal" class="modal">
    <div class="modal-content">
        <h3 id="foodEditTitle">Добавить продукт</h3>
        <input type="text" id="editFoodName" placeholder="Название">
        <input type="number" id="editFoodGrams" placeholder="Вес (г)" value="100">
        <input type="number" id="editFoodKcalPer100g" placeholder="ккал на 100 г">
        <button id="saveFoodEditBtn">Добавить</button>
        <button id="closeFoodModalBtn" style="background:#555;">Отмена</button>
    </div>
</div>

<!-- Модалка для рецепта -->
<div id="recipeModal" class="modal"><div class="modal-content"><h3>Выбрать рецепт</h3><input type="text" id="recipeSearchQuery" placeholder="Поиск рецепта..."><button id="searchRecipeBtn">Искать в интернете</button><div id="recipeResultsList" style="max-height:200px; overflow-y:auto; margin-top:10px;"></div><button id="closeRecipeModalBtn" style="background:#555;">Отмена</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDYfZrjWuDKkrx4aod7rfw--muqnq_X36g",
        authDomain: "transformatoralexey.firebaseapp.com",
        projectId: "transformatoralexey",
        storageBucket: "transformatoralexey.firebasestorage.app",
        messagingSenderId: "14371043469",
        appId: "1:14371043469:web:8f8154621a6bb1eae2cac4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUserId = null, currentWeekStart = new Date(), tasks = {}, weightLog = [], stepsLog = [], weeklyMeals = {}, customFoods = [];
    let currentFoods = [];
    let editFoodIndex = null;

    function getStartOfWeek(d){const day=d.getDay(),diff=day===0?6:day-1;const nd=new Date(d);nd.setDate(nd.getDate()-diff);nd.setHours(0,0,0,0);return nd}
    function getWeekKey(d){const s=getStartOfWeek(d),y=s.getFullYear(),w=Math.ceil(((s-new Date(y,0,1))/864e5+1)/7);return`${y}-W${w}`}
    function getTodayStr(){return new Date().toISOString().slice(0,10)}

    async function loadCustomFoods(){if(!currentUserId)return;const snap=await db.collection('users').doc(currentUserId).collection('customFoods').get();customFoods=[];snap.forEach(d=>customFoods.push(d.data()));}
    async function saveCustomFood(f){if(!currentUserId)return;const id=f.name.toLowerCase().replace(/\s/g,'_');await db.collection('users').doc(currentUserId).collection('customFoods').doc(id).set(f);customFoods.push(f);}
    async function deleteCustomFood(name){if(!currentUserId)return;const id=name.toLowerCase().replace(/\s/g,'_');await db.collection('users').doc(currentUserId).collection('customFoods').doc(id).delete();customFoods=customFoods.filter(f=>f.name!==name);}

    async function loadAllData(){if(!currentUserId)return;const t=await db.collection('users').doc(currentUserId).collection('tasks').get();tasks={};t.forEach(d=>{tasks[d.id]=d.data().items||[]});const w=await db.collection('users').doc(currentUserId).collection('weight').get();weightLog=[];w.forEach(d=>weightLog.push({date:d.id,weight:d.data().weight}));const s=await db.collection('users').doc(currentUserId).collection('steps').get();stepsLog=[];s.forEach(d=>stepsLog.push({date:d.id,steps:d.data().steps}));const m=await db.collection('users').doc(currentUserId).collection('weeklyMeals').get();weeklyMeals={};m.forEach(d=>{weeklyMeals[d.id]=d.data().plan});await loadCustomFoods();renderCalendar();renderTasksForDate(getTodayStr());updateChart();renderCurrentWeekMenu();}
    async function saveTasks(){if(!currentUserId)return;for(let d in tasks)await db.collection('users').doc(currentUserId).collection('tasks').doc(d).set({items:tasks[d]})}
    async function saveWeightEntry(d,w){await db.collection('users').doc(currentUserId).collection('weight').doc(d).set({weight:w})}
    async function saveStepsEntry(d,s){await db.collection('users').doc(currentUserId).collection('steps').doc(d).set({steps:s})}
    async function saveWeeklyMeal(k,p){await db.collection('users').doc(currentUserId).collection('weeklyMeals').doc(k).set({plan:p});weeklyMeals[k]=p;renderCurrentWeekMenu();}

    // КАЛЕНДАРЬ ЗАДАЧ
    let currentCalendarDate=new Date(),selectedDateStr=getTodayStr();
    function renderCalendar(){const y=currentCalendarDate.getFullYear(),m=currentCalendarDate.getMonth(),fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();let html=`<div style="display:flex;justify-content:space-between;"><button id="prevMonthBtn" style="background:none;border:none;color:#5D9BFF;">◀</button><span>${currentCalendarDate.toLocaleString('ru',{month:'long',year:'numeric'})}</span><button id="nextMonthBtn" style="background:none;border:none;color:#5D9BFF;">▶</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;">Пн Вт Ср Чт Пт Сб Вс</div><div class="calendar-grid" id="calendarGrid"></div>`;document.getElementById('calendarWidget').innerHTML=html;const grid=document.getElementById('calendarGrid');let so=fd===0?6:fd-1,day=1;for(let i=0;i<42;i++){if(i<so||day>dim){let e=document.createElement('div');e.className='cal-day';e.style.opacity='0.3';grid.appendChild(e)}else{let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`,hasTasks=tasks[ds]&&tasks[ds].some(t=>!t.done),btn=document.createElement('div');btn.className=`cal-day ${selectedDateStr===ds?'selected':''} ${hasTasks?'task-exists':''}`;btn.innerText=day;btn.addEventListener('click',(function(ds){return function(){selectDate(ds)}})(ds));grid.appendChild(btn);day++}}document.getElementById('prevMonthBtn')?.addEventListener('click',()=>{currentCalendarDate.setMonth(currentCalendarDate.getMonth()-1);renderCalendar()});document.getElementById('nextMonthBtn')?.addEventListener('click',()=>{currentCalendarDate.setMonth(currentCalendarDate.getMonth()+1);renderCalendar()})}
    function selectDate(ds){selectedDateStr=ds;renderCalendar();renderTasksForDate()}
    function renderTasksForDate(){const c=document.getElementById('taskList'),dt=tasks[selectedDateStr]||[];if(dt.length===0){c.innerHTML='<div style="text-align:center;">Нет задач</div>';return}let html='';dt.forEach((t,i)=>{html+=`<div class="task-item ${t.done?'completed':''}"><input type="checkbox" class="task-check" ${t.done?'checked':''} data-idx="${i}"><span class="task-text">${escapeHtml(t.text)}</span><button class="task-del" data-idx="${i}"><i class="fas fa-trash-alt"></i></button></div>`});c.innerHTML=html;document.querySelectorAll('.task-check').forEach(cb=>{cb.addEventListener('change',async(e)=>{let idx=parseInt(e.target.dataset.idx);tasks[selectedDateStr][idx].done=e.target.checked;await saveTasks();renderTasksForDate();renderCalendar()})});document.querySelectorAll('.task-del').forEach(btn=>{btn.addEventListener('click',async(e)=>{let idx=parseInt(btn.dataset.idx);tasks[selectedDateStr].splice(idx,1);if(tasks[selectedDateStr].length===0)delete tasks[selectedDateStr];await saveTasks();renderTasksForDate();renderCalendar()})})}
    async function addTask(){let t=document.getElementById('newTaskText').value.trim();if(!t)return;if(!tasks[selectedDateStr])tasks[selectedDateStr]=[];tasks[selectedDateStr].push({text:t,done:false});await saveTasks();document.getElementById('newTaskText').value='';renderTasksForDate();renderCalendar()}

    // ПРОДУКТЫ - АВТОКОМПЛИТ ИЗ customFoods
    function showAutocomplete(query){
        const listDiv=document.getElementById('autocompleteList');
        if(!query.trim() || customFoods.length===0){listDiv.style.display='none';return;}
        const matches=customFoods.filter(f=>f.name.toLowerCase().includes(query.toLowerCase())).slice(0,5);
        if(matches.length===0){listDiv.style.display='none';return;}
        let html='';
        matches.forEach(f=>{html+=`<div class="autocomplete-item" data-name="${escapeHtml(f.name)}" data-kcal="${f.kcalPer100g}">${escapeHtml(f.name)} — ${f.kcalPer100g} ккал/100г</div>`});
        listDiv.innerHTML=html;
        listDiv.style.display='block';
        document.querySelectorAll('.autocomplete-item').forEach(el=>{
            el.addEventListener('click',()=>{
                const name=el.dataset.name;
                const kcal=parseFloat(el.dataset.kcal);
                prepareAddProduct(name,kcal);
                listDiv.style.display='none';
                document.getElementById('foodSearchInput').value='';
            });
        });
    }
    document.getElementById('foodSearchInput').addEventListener('input',(e)=>showAutocomplete(e.target.value));
    document.addEventListener('click',(e)=>{if(!e.target.closest('.food-search-row')) document.getElementById('autocompleteList').style.display='none';});

    function renderFoodList(){
        const container=document.getElementById('foodList');
        if(currentFoods.length===0){container.innerHTML='<div style="color:#9AA6BF;">Добавьте продукты</div>';return}
        let html='';
        currentFoods.forEach((f,idx)=>{
            html+=`<div class="food-item"><span class="food-info">${f.name} — ${f.grams}г = ${Math.round(f.kcal)} ккал</span><div><button class="food-edit" data-idx="${idx}"><i class="fas fa-pen"></i></button><button class="food-delete" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button></div></div>`;
        });
        container.innerHTML=html;
        document.querySelectorAll('.food-edit').forEach(btn=>{btn.addEventListener('click',(e)=>{let idx=parseInt(btn.dataset.idx);openFoodEditModal(idx);})});
        document.querySelectorAll('.food-delete').forEach(btn=>{btn.addEventListener('click',(e)=>{let idx=parseInt(btn.dataset.idx);currentFoods.splice(idx,1);renderFoodList();updateTotalCalories();})});
        updateTotalCalories();
    }
    function updateTotalCalories(){let total=currentFoods.reduce((s,f)=>s+f.kcal,0);document.getElementById('totalCalories').innerHTML=`🔥 ${Math.round(total)} ккал (всего)`}
    function openFoodEditModal(index=null){
        editFoodIndex=index;
        const modal=document.getElementById('foodEditModal');
        const title=document.getElementById('foodEditTitle');
        if(index!==null){
            title.innerText='Редактировать продукт';
            const f=currentFoods[index];
            document.getElementById('editFoodName').value=f.name;
            document.getElementById('editFoodGrams').value=f.grams;
            document.getElementById('editFoodKcalPer100g').value=Math.round(f.kcal / f.grams * 100);
        }else{
            title.innerText='Добавить продукт';
            document.getElementById('editFoodName').value='';
            document.getElementById('editFoodGrams').value='100';
            document.getElementById('editFoodKcalPer100g').value='';
        }
        modal.style.display='flex';
    }
    function saveFoodFromModal(){
        const name=document.getElementById('editFoodName').value.trim();
        const grams=parseFloat(document.getElementById('editFoodGrams').value);
        const kcalPer100g=parseFloat(document.getElementById('editFoodKcalPer100g').value);
        if(!name||isNaN(grams)||grams<=0||isNaN(kcalPer100g)||kcalPer100g<0){alert('Введите корректные данные');return;}
        const kcal=(kcalPer100g*grams/100);
        const product={name,grams,kcal};
        if(editFoodIndex!==null){currentFoods[editFoodIndex]=product;}else{currentFoods.push(product);}
        renderFoodList();
        document.getElementById('foodEditModal').style.display='none';
        editFoodIndex=null;
    }
    document.getElementById('saveFoodEditBtn').addEventListener('click',saveFoodFromModal);
    document.getElementById('closeFoodModalBtn').addEventListener('click',()=>{document.getElementById('foodEditModal').style.display='none';editFoodIndex=null;});

    // ПОИСК ПРОДУКТОВ ЧЕРЕЗ API С ПРОКСИ
    const PROXIES=[url=>`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,url=>`https://cors-anywhere.herokuapp.com/${url}`];
    async function searchWithProxy(query,proxyIndex=0){if(proxyIndex>=PROXIES.length) throw new Error('All proxies failed');const targetUrl=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8`;const proxyUrl=PROXIES[proxyIndex](targetUrl);const resp=await fetch(proxyUrl);const text=await resp.text();let data;try{data=JSON.parse(text);}catch(e){throw new Error('Invalid JSON');}if(data&&data.contents) data=JSON.parse(data.contents);if(data&&data.products) return data;else throw new Error('No products');}
    document.getElementById('searchFoodBtn').addEventListener('click',async()=>{const query=document.getElementById('foodSearchInput').value.trim();if(!query)return;const resultsDiv=document.getElementById('searchResults');resultsDiv.innerHTML='<i class="fas fa-spinner fa-spin"></i> Ищем...';for(let i=0;i<PROXIES.length;i++){try{const content=await searchWithProxy(query,i);if(content.products&&content.products.length){let html='<strong>Найденные продукты:</strong><ul>';for(let p of content.products){let name=p.product_name_ru||p.product_name||p.generic_name||'Без названия';let kcalPer100g=p.nutriments?.['energy-kcal_100g']||p.nutriments?.energy_kcal_100g||0;if(kcalPer100g>0&&name&&name!=='Без названия'){html+=`<li style="cursor:pointer;margin-bottom:5px;" onclick="prepareAddProduct('${escapeHtml(name)}', ${kcalPer100g})">${escapeHtml(name)} — ${kcalPer100g} ккал/100г</li>`;}}html+='</ul>';if(html.indexOf('cursor:pointer')===-1)html+='<li>Нет продуктов с калориями</li>';resultsDiv.innerHTML=html;return;}}catch(e){console.warn(`Proxy ${i} failed`,e);continue;}}resultsDiv.innerHTML='Не удалось найти продукты.';});
    window.prepareAddProduct=function(name,kcalPer100g){document.getElementById('editFoodName').value=name;document.getElementById('editFoodGrams').value='100';document.getElementById('editFoodKcalPer100g').value=kcalPer100g;editFoodIndex=null;document.getElementById('foodEditTitle').innerText='Добавить продукт';document.getElementById('foodEditModal').style.display='flex';document.getElementById('searchResults').innerHTML='';document.getElementById('foodSearchInput').value='';};
    document.getElementById('addCustomProductBtn').addEventListener('click',()=>{openFoodEditModal(null);});

    // ТРЕКЕР С ВЫБОРОМ ДАТЫ
    let chart;
    async function logData(){let date=document.getElementById('trackerDate').value;if(!date) date=getTodayStr();let weight=parseFloat(document.getElementById('weightInput').value);let steps=parseInt(document.getElementById('stepsInput').value);if(!isNaN(weight)){weightLog=weightLog.filter(w=>w.date!==date);weightLog.push({date,weight});await saveWeightEntry(date,weight);}if(!isNaN(steps)){stepsLog=stepsLog.filter(s=>s.date!==date);stepsLog.push({date,steps});await saveStepsEntry(date,steps);}document.getElementById('weightInput').value='';document.getElementById('stepsInput').value='';updateChart();}
    function updateChart(){const last30=[];for(let i=29;i>=0;i--){let d=new Date();d.setDate(d.getDate()-i);last30.push(d.toISOString().slice(0,10));}let weightData=last30.map(ds=>{let e=weightLog.find(w=>w.date===ds);return e?e.weight:null});let stepsData=last30.map(ds=>{let e=stepsLog.find(s=>s.date===ds);return e?e.steps/1000:null});const ctx=document.getElementById('progressChart').getContext('2d');if(chart)chart.destroy();chart=new Chart(ctx,{type:'line',data:{labels:last30.map(d=>d.slice(5)),datasets:[{label:'Вес (кг)',data:weightData,borderColor:'#FFB347',tension:0.2},{label:'Шаги (тыс.)',data:stepsData,borderColor:'#5D9BFF',tension:0.2}]},options:{responsive:true,maintainAspectRatio:true}});}
    document.getElementById('trackerDate').value=getTodayStr();

    // НЕДЕЛЬНОЕ МЕНЮ (5 ПРИЁМОВ)
    const mealTimes={breakfast:'08:00',secondBreakfast:'11:00',lunch:'14:00',afternoonSnack:'17:00',dinner:'20:00'};
    async function renderCurrentWeekMenu(){const wk=getWeekKey(currentWeekStart),start=getStartOfWeek(currentWeekStart),days=[];for(let i=0;i<7;i++){let d=new Date(start);d.setDate(start.getDate()+i);days.push(d.toISOString().slice(0,10));}document.getElementById('weekRange').innerText=`${days[0]} – ${days[6]}`;let plan=weeklyMeals[wk];if(!plan){document.getElementById('weeklyMealPlan').innerHTML='<div style="text-align:center;">Нет меню. Нажми "Сгенерировать"</div>';return;}let html='';for(let i=0;i<days.length;i++){let dp=plan[i];if(dp){html+=`<div class="day-plan"><div class="day-title">📅 ${days[i]}</div><div class="meal-row"><span class="meal-name">🍳 Завтрак (08:00): ${escapeHtml(dp.breakfast||'—')}</span><button class="meal-edit" data-dayidx="${i}" data-meal="breakfast"><i class="fas fa-pen"></i></button></div><div class="meal-row"><span class="meal-name">🍎 Второй завтрак (11:00): ${escapeHtml(dp.secondBreakfast||'—')}</span><button class="meal-edit" data-dayidx="${i}" data-meal="secondBreakfast"><i class="fas fa-pen"></i></button></div><div class="meal-row"><span class="meal-name">🍗 Обед (14:00): ${escapeHtml(dp.lunch||'—')}</span><button class="meal-edit" data-dayidx="${i}" data-meal="lunch"><i class="fas fa-pen"></i></button></div><div class="meal-row"><span class="meal-name">🍪 Полдник (17:00): ${escapeHtml(dp.afternoonSnack||'—')}</span><button class="meal-edit" data-dayidx="${i}" data-meal="afternoonSnack"><i class="fas fa-pen"></i></button></div><div class="meal-row"><span class="meal-name">🌙 Ужин (20:00): ${escapeHtml(dp.dinner||'—')}</span><button class="meal-edit" data-dayidx="${i}" data-meal="dinner"><i class="fas fa-pen"></i></button></div><div style="color:#FFB347;">🔥 ~${dp.total||0} ккал</div></div>`;}else{html+=`<div class="day-plan"><div class="day-title">${days[i]}</div><div>Нет плана</div></div>`;}}document.getElementById('weeklyMealPlan').innerHTML=html;document.querySelectorAll('.meal-edit').forEach(btn=>{btn.addEventListener('click',(e)=>{let di=parseInt(btn.dataset.dayidx),mt=btn.dataset.meal;openRecipeModal(wk,di,mt);});});}
    let currW,currD,currM;
    function openRecipeModal(wk,di,mt){currW=wk;currD=di;currM=mt;document.getElementById('recipeModal').style.display='flex';document.getElementById('recipeResultsList').innerHTML='';document.getElementById('recipeSearchQuery').value='';}
    document.getElementById('searchRecipeBtn').addEventListener('click',async()=>{let q=document.getElementById('recipeSearchQuery').value.trim();if(!q)return;const resDiv=document.getElementById('recipeResultsList');resDiv.innerHTML='<i class="fas fa-spinner fa-spin"></i> Ищем...';try{const url=`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`;const resp=await fetch(url);const data=await resp.json();if(data.meals){let html='<strong>Выберите рецепт:</strong><ul>';for(let meal of data.meals){html+=`<li style="margin-bottom:8px;cursor:pointer;" onclick="selectRecipe('${escapeHtml(meal.strMeal)}')">${escapeHtml(meal.strMeal)}</li>`;}html+='</ul>';resDiv.innerHTML=html;}else{resDiv.innerHTML='Рецептов не найдено';}}catch(e){resDiv.innerHTML='Ошибка поиска';}});
    window.selectRecipe=async function(name){let plan=weeklyMeals[currW];if(plan&&plan[currD]){plan[currD][currM]=name;let total=0;['breakfast','secondBreakfast','lunch','afternoonSnack','dinner'].forEach(m=>{if(plan[currD][m]) total+=350;});plan[currD].total=total;await saveWeeklyMeal(currW,plan);renderCurrentWeekMenu();}document.getElementById('recipeModal').style.display='none';};
    document.getElementById('closeRecipeModalBtn').addEventListener('click',()=>{document.getElementById('recipeModal').style.display='none';});
    async function generateWeeklyPlan(){const wk=getWeekKey(currentWeekStart);const breakfasts=["Овсянка с ягодами","Омлет","Творог","Каша гречневая","Яичница"];const secondBreakfasts=["Яблоко","Банан","Йогурт","Горсть орехов","Сырники"];const lunches=["Курица с гречкой","Рис с овощами","Суп куриный","Индейка с киноа","Рыба на пару"];const afternoonSnacks=["Творог","Кефир","Фрукт","Протеиновый батончик","Морковь с хумусом"];const dinners=["Рыба с овощами","Творожная запеканка","Салат с тунцом","Овощное рагу","Куриное филе"];let plan=[];for(let i=0;i<7;i++){let breakfast=breakfasts[Math.floor(Math.random()*breakfasts.length)];let secondBreakfast=secondBreakfasts[Math.floor(Math.random()*secondBreakfasts.length)];let lunch=lunches[Math.floor(Math.random()*lunches.length)];let afternoonSnack=afternoonSnacks[Math.floor(Math.random()*afternoonSnacks.length)];let dinner=dinners[Math.floor(Math.random()*dinners.length)];let total=400+200+500+200+400;plan.push({breakfast,secondBreakfast,lunch,afternoonSnack,dinner,total});}await saveWeeklyMeal(wk,plan);}

    const adviceList=["🚶‍♂️ 5000 шагов в день","💧 Пей воду","😴 Спи 7-8 часов","🍗 Белок в каждый приём","🏋️ Лестница вместо лифта","🍎 5 приёмов пищи помогают не голодать"];
    function randomAdvice(){document.getElementById('dailyAdvice').innerHTML=`<i class="fas fa-star-of-life"></i> ${adviceList[Math.floor(Math.random()*adviceList.length)]}`;}
    function escapeHtml(str){return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;'));}

    auth.signInAnonymously().catch(console.error);
    auth.onAuthStateChanged(async(user)=>{if(user){currentUserId=user.uid;document.getElementById('authStatus').innerHTML=`✅ Синхронизация активна (${user.uid.slice(0,6)}...)`;await loadAllData();currentWeekStart=getStartOfWeek(new Date());renderCurrentWeekMenu();}else{document.getElementById('authStatus').innerHTML='❌ Ошибка.';}});
    document.getElementById('addTaskBtn').addEventListener('click',addTask);
    document.getElementById('logDataBtn').addEventListener('click',logData);
    document.getElementById('generateMealPlanBtn').addEventListener('click',generateWeeklyPlan);
    document.getElementById('refreshAdvice').addEventListener('click',randomAdvice);
    document.getElementById('newTaskText').addEventListener('keypress',(e)=>{if(e.key==='Enter')addTask()});
    document.getElementById('prevWeekBtn').addEventListener('click',()=>{currentWeekStart.setDate(currentWeekStart.getDate()-7);renderCurrentWeekMenu();});
    document.getElementById('nextWeekBtn').addEventListener('click',()=>{currentWeekStart.setDate(currentWeekStart.getDate()+7);renderCurrentWeekMenu();});
    randomAdvice();
</script>
</body>
</html>
