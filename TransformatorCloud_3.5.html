<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <link rel="icon" href="data:,">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0B1120 0%,#19212E 100%);color:#E8EDF5;padding:1rem;min-height:100vh}
        .container{max-width:1400px;margin:0 auto}
        .header{margin-bottom:1.5rem;text-align:center}
        .header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#FFF,#A5B9FF);-webkit-background-clip:text;background-clip:text;color:transparent}
        .auth-container{max-width:400px;margin:2rem auto;background:rgba(22,32,48,0.95);border-radius:32px;padding:2rem;text-align:center}
        .auth-container input,.auth-container select{width:100%;margin:10px 0;padding:12px;border-radius:60px;border:none;background:#0F1622;color:#fff}

        .dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.2rem;margin-bottom:1.2rem}
        .card{background:rgba(22,32,48,0.85);border-radius:28px;padding:1.2rem;border:1px solid rgba(72,92,120,0.3)}
        .card-title{font-size:1.3rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:8px;border-left:4px solid #5D9BFF;padding-left:12px}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;margin:10px 0}
        .cal-day{background:#1E2A3A;padding:8px 4px;border-radius:40px;cursor:pointer;font-size:.85rem}
        .cal-day.selected{background:#5D9BFF}
        .task-list{max-height:150px;overflow-y:auto;margin:10px 0}
        .task-item{display:flex;align-items:center;gap:8px;background:#111A26;padding:6px 12px;border-radius:60px;margin-bottom:6px}
        .task-item.completed .task-text{text-decoration:line-through;opacity:.6}
        .task-text{flex:1;font-size:.85rem}
        .add-task-form{display:flex;gap:8px;margin-top:8px}
        .add-task-form input{flex:1;background:#0F1622;border:1px solid #2E3D52;padding:8px;border-radius:40px;color:#fff}
        .add-task-form button{background:#5D9BFF;border:none;padding:0 16px;border-radius:40px;cursor:pointer}
        .food-search-row{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;position:relative}
        .food-search-row input{flex:2;background:#0F1622;border:1px solid #2E3D52;padding:8px;border-radius:40px;color:#fff}
        .food-search-row button{background:#5D9BFF;border:none;padding:0 16px;border-radius:40px;cursor:pointer}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#1E2A3A;border-radius:20px;z-index:10;max-height:150px;overflow-y:auto}
        .autocomplete-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid #2E3D52}
        .food-list{max-height:200px;overflow-y:auto;margin:10px 0}
        .food-item{display:flex;justify-content:space-between;align-items:center;background:#1E2A3A;padding:5px 10px;border-radius:30px;margin-bottom:4px}
        .food-edit,.food-delete{background:0 0;border:none;color:#FFB347;cursor:pointer;margin-left:6px}
        .total-calories{font-weight:700;background:#2E3D52;padding:8px;border-radius:40px;text-align:center;margin:8px 0}
        .tracker-input{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
        .tracker-input input{flex:1;background:#0F1622;border:1px solid #2E3D52;padding:8px;border-radius:40px;color:#fff}
        .tracker-input button{background:#5D9BFF;border:none;padding:0 16px;border-radius:40px}
        canvas{max-height:180px;margin-top:10px}
        .meal-plan-grid{max-height:500px;overflow-y:auto;margin:10px 0}
        .day-plan{background:#0F1622;border-radius:20px;padding:10px;margin-bottom:12px}
        .day-title{color:#FFB347;font-weight:700;margin-bottom:6px}
        .meal-row{display:flex;justify-content:space-between;align-items:center;margin:6px 0;background:#1E2A3A;padding:5px 10px;border-radius:40px}
        .meal-name{flex:1;font-size:.85rem}
        .meal-edit{background:0 0;border:none;color:#5D9BFF;cursor:pointer;margin-left:8px}
        .generate-plan-btn{background:#5D9BFF;border:none;padding:12px;border-radius:60px;width:100%;margin-top:8px;font-weight:700;cursor:pointer}
        .sync-btn{background:#2E3D52;border:none;padding:8px;border-radius:60px;width:100%;margin-top:8px;cursor:pointer}
        .advice-box{background:#0F1622;padding:1rem;border-radius:24px;margin-top:8px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:1000}
        .modal-content{background:#1E2A3A;border-radius:28px;padding:1.5rem;width:90%;max-width:500px}
        .modal-content input{width:100%;margin:8px 0;padding:8px;border-radius:40px;border:none;background:#0F1622;color:#fff}
        .modal-content button{margin-top:12px;background:#5D9BFF;border:none;padding:8px;border-radius:40px;cursor:pointer}
        button{border:none;cursor:pointer}
        @media(min-width:768px){body{padding:2rem}}
    </style>
</head>
<body>
<div id="app"></div>

<script>

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let userProfile = null;
    let tasks = {}, weightLog = [], stepsLog = [], weeklyMeals = {}, customFoods = [];
    let currentFoods = [];
    let currentCalendarDate = new Date(), selectedDateStr = new Date().toISOString().slice(0,10);
    let currentWeekStart = new Date();
    let chart = null;
    let editFoodIndex = null, currentEditMeal = null;

    function escapeHtml(str){return str.replace(/[&<>]/g,m=>m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;'))}
    function getStartOfWeek(d){const day=d.getDay(),diff=day===0?6:day-1;const nd=new Date(d);nd.setDate(nd.getDate()-diff);nd.setHours(0,0,0,0);return nd}
    function getWeekKey(d){const s=getStartOfWeek(d),y=s.getFullYear(),w=Math.ceil(((s-new Date(y,0,1))/864e5+1)/7);return`${y}-W${w}`}
    function getTodayStr(){return new Date().toISOString().slice(0,10)}

    function calculateCalories(profile){
        let bmr;
        if(profile.gender === 'male'){
            bmr = 88.36 + (13.4 * profile.weight) + (4.8 * profile.height) - (5.7 * profile.age);
        } else {
            bmr = 447.6 + (9.2 * profile.weight) + (3.1 * profile.height) - (4.3 * profile.age);
        }
        let activityFactor = {low:1.2, medium:1.55, high:1.9}[profile.activity] || 1.2;
        let tdee = bmr * activityFactor;
        if(profile.goal === 'lose') return Math.round(tdee - 500);
        if(profile.goal === 'gain') return Math.round(tdee + 300);
        return Math.round(tdee);
    }

    async function loadUserData(uid){
        if(!uid) return;
        const doc = await db.collection('users').doc(uid).get();
        if(doc.exists) userProfile = doc.data();
        const tasksSnap = await db.collection('users').doc(uid).collection('tasks').get();
        tasks = {};
        tasksSnap.forEach(d=>{ tasks[d.id] = d.data().items || []; });
        const weightSnap = await db.collection('users').doc(uid).collection('weight').get();
        weightLog = [];
        weightSnap.forEach(d=> weightLog.push({date: d.id, weight: d.data().weight}));
        const stepsSnap = await db.collection('users').doc(uid).collection('steps').get();
        stepsLog = [];
        stepsSnap.forEach(d=> stepsLog.push({date: d.id, steps: d.data().steps}));
        const mealsSnap = await db.collection('users').doc(uid).collection('weeklyMeals').get();
        weeklyMeals = {};
        mealsSnap.forEach(d=> { weeklyMeals[d.id] = d.data().plan; });
        const customSnap = await db.collection('users').doc(uid).collection('customFoods').get();
        customFoods = [];
        customSnap.forEach(d=> customFoods.push(d.data()));
    }

    async function saveTasks(uid){ if(!uid) return; for(let d in tasks) await db.collection('users').doc(uid).collection('tasks').doc(d).set({items: tasks[d]}); }
    async function saveWeightEntry(uid,date,weight){ await db.collection('users').doc(uid).collection('weight').doc(date).set({weight}); }
    async function saveStepsEntry(uid,date,steps){ await db.collection('users').doc(uid).collection('steps').doc(date).set({steps}); }
    async function saveWeeklyMeal(uid,key,plan){ await db.collection('users').doc(uid).collection('weeklyMeals').doc(key).set({plan}); weeklyMeals[key]=plan; renderCurrentWeekMenu(); }
    async function saveCustomFood(uid,food){ const id = food.name.toLowerCase().replace(/\s/g,'_'); await db.collection('users').doc(uid).collection('customFoods').doc(id).set(food); customFoods.push(food); }

    async function saveProfile(uid,profile){
        if(!uid) return;
        await db.collection('users').doc(uid).set(profile);
        userProfile = profile;
    }

    function renderProfileModal(){
        const modalHtml = `
            <div id="profileModal" class="modal" style="display:flex">
                <div class="modal-content">
                    <h3>Настройки профиля</h3>
                    <input type="number" id="modalWeight" placeholder="Вес (кг)" step="0.1" value="${userProfile?.weight || ''}">
                    <input type="number" id="modalHeight" placeholder="Рост (см)" value="${userProfile?.height || ''}">
                    <input type="number" id="modalAge" placeholder="Возраст" value="${userProfile?.age || ''}">
                    <select id="modalActivity">
                        <option value="low" ${userProfile?.activity === 'low' ? 'selected' : ''}>Малоподвижный</option>
                        <option value="medium" ${userProfile?.activity === 'medium' ? 'selected' : ''}>Умеренно активный</option>
                        <option value="high" ${userProfile?.activity === 'high' ? 'selected' : ''}>Очень активный</option>
                    </select>
                    <select id="modalGoal">
                        <option value="lose" ${userProfile?.goal === 'lose' ? 'selected' : ''}>Похудеть</option>
                        <option value="maintain" ${userProfile?.goal === 'maintain' ? 'selected' : ''}>Поддерживать</option>
                        <option value="gain" ${userProfile?.goal === 'gain' ? 'selected' : ''}>Набрать массу</option>
                    </select>
                    <select id="modalGender">
                        <option value="male" ${userProfile?.gender === 'male' ? 'selected' : ''}>Мужской</option>
                        <option value="female" ${userProfile?.gender === 'female' ? 'selected' : ''}>Женский</option>
                    </select>
                    <button id="saveProfileModalBtn">Сохранить</button>
                    <button id="closeProfileModalBtn">Отмена</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('saveProfileModalBtn').onclick = async () => {
            const profile = {
                weight: parseFloat(document.getElementById('modalWeight').value),
                height: parseFloat(document.getElementById('modalHeight').value),
                age: parseInt(document.getElementById('modalAge').value),
                activity: document.getElementById('modalActivity').value,
                goal: document.getElementById('modalGoal').value,
                gender: document.getElementById('modalGender').value
            };
            if(!profile.weight || !profile.height || !profile.age){ alert('Заполните все поля'); return; }
            profile.targetCalories = calculateCalories(profile);
            await saveProfile(currentUser.uid, profile);
            document.getElementById('profileModal').remove();
            renderMainApp();
        };
        document.getElementById('closeProfileModalBtn').onclick = () => document.getElementById('profileModal').remove();
    }

    function renderMainApp(){
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div class="header">
                    <h1><i class="fas fa-cloud-sun"></i> Трансформатор 3.5</h1>
                    <p>${currentUser.email || (currentUser.isAnonymous ? 'Анонимный пользователь' : currentUser.uid.slice(0,8))} | Норма: ${userProfile?.targetCalories || '—'} ккал/день</p>
                    <button id="logoutBtn" style="background:#555;border:none;padding:5px 12px;border-radius:40px;margin-top:5px;"><i class="fas fa-sign-out-alt"></i> Выйти</button>
                    <button id="profileBtn" style="background:#2E3D52;border:none;padding:5px 12px;border-radius:40px;margin-top:5px;"><i class="fas fa-user"></i> Профиль</button>
                </div>
                <div class="dashboard">
                    <div class="card"><div class="card-title"><i class="fas fa-calendar-alt"></i> Задачи</div><div id="calendarWidget"></div><div id="taskList" class="task-list"></div><div class="add-task-form"><input type="text" id="newTaskText" placeholder="Новая задача"><button id="addTaskBtn"><i class="fas fa-plus"></i></button></div></div>
                    <div class="card"><div class="card-title"><i class="fas fa-calculator"></i> Калькулятор калорий</div><div class="food-search-row"><input type="text" id="foodSearchInput" placeholder="Поиск продукта" autocomplete="off"><button id="searchFoodBtn"><i class="fas fa-search"></i> Найти</button><div id="autocompleteList" class="autocomplete-list" style="display:none"></div></div><div id="searchResults"></div><div id="foodList" class="food-list"></div><div id="totalCalories" class="total-calories">🔥 0 ккал</div><button id="addCustomProductBtn" style="background:#2E3D52;width:100%;border-radius:40px;padding:8px;margin-top:8px;"><i class="fas fa-plus"></i> Добавить продукт</button></div>
                    <div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> Вес и шаги</div><div class="tracker-input"><input type="date" id="trackerDate"><input type="number" id="weightInput" placeholder="Вес (кг)" step="0.1"><input type="number" id="stepsInput" placeholder="Шаги"><button id="logDataBtn"><i class="fas fa-save"></i> Записать</button></div><canvas id="progressChart" width="400" height="180"></canvas></div>
                </div>
                <div class="card" style="margin-bottom:1.2rem"><div class="card-title"><i class="fas fa-calendar-week"></i> План питания (5 приёмов)</div><div id="weeklyMealPlan" class="meal-plan-grid"></div><button id="generateMealPlanBtn" class="generate-plan-btn"><i class="fas fa-magic"></i> Сгенерировать меню на неделю</button><div style="margin-top:8px;text-align:center"><button id="prevWeekBtn" style="background:#2E3D52;border:none;padding:6px 12px;border-radius:40px;">◀ Пред. неделя</button><span id="weekRange" style="margin:0 12px;">Текущая неделя</span><button id="nextWeekBtn" style="background:#2E3D52;border:none;padding:6px 12px;border-radius:40px;">След. неделя ▶</button></div></div>
                <div class="card"><div class="card-title"><i class="fas fa-brain"></i> Совет дня</div><div class="advice-box" id="dailyAdvice"></div><button id="refreshAdvice" style="margin-top:12px;background:#2E3D52;border:none;padding:8px;border-radius:60px;width:100%;cursor:pointer;">🔄 Другой совет</button></div>
            </div>
            <div id="foodEditModal" class="modal"><div class="modal-content"><h3 id="foodEditTitle">Добавить продукт</h3><input type="text" id="editFoodName" placeholder="Название"><input type="number" id="editFoodGrams" placeholder="Вес (г)" value="100"><input type="number" id="editFoodKcalPer100g" placeholder="ккал на 100 г"><button id="saveFoodEditBtn">Добавить</button><button id="closeFoodModalBtn">Отмена</button></div></div>
            <div id="mealEditModal" class="modal"><div class="modal-content"><h3>Редактировать приём пищи</h3><input type="text" id="mealEditName" placeholder="Название"><input type="number" id="mealEditWeight" placeholder="Вес (г)"><input type="number" id="mealEditCalories" placeholder="Калории"><button id="saveMealEditBtn">Сохранить</button><button id="closeMealModalBtn">Отмена</button></div></div>
            <div id="recipeModal" class="modal"><div class="modal-content"><h3>Поиск рецепта</h3><input type="text" id="recipeSearchQuery" placeholder="Название"><button id="searchRecipeBtn">Искать</button><div id="recipeResultsList"></div><button id="closeRecipeModalBtn">Отмена</button></div></div>
        `;
        attachMainEvents();
        renderCalendar();
        renderTasksForDate(getTodayStr());
        updateChart();
        renderCurrentWeekMenu();
        document.getElementById('trackerDate').value = getTodayStr();
    }

    function attachMainEvents(){
        document.getElementById('logoutBtn').onclick = () => auth.signOut();
        document.getElementById('profileBtn').onclick = () => renderProfileModal();
        document.getElementById('addTaskBtn').onclick = addTask;
        document.getElementById('newTaskText').addEventListener('keypress', e => { if(e.key === 'Enter') addTask(); });
        document.getElementById('logDataBtn').onclick = logData;
        document.getElementById('generateMealPlanBtn').onclick = generateWeeklyPlan;
        document.getElementById('refreshAdvice').onclick = randomAdvice;
        document.getElementById('prevWeekBtn').onclick = () => { currentWeekStart.setDate(currentWeekStart.getDate()-7); renderCurrentWeekMenu(); };
        document.getElementById('nextWeekBtn').onclick = () => { currentWeekStart.setDate(currentWeekStart.getDate()+7); renderCurrentWeekMenu(); };
        document.getElementById('searchFoodBtn').onclick = searchFoodOnline;
        document.getElementById('addCustomProductBtn').onclick = () => openFoodEditModal(null);
        document.getElementById('saveFoodEditBtn').onclick = saveFoodFromModal;
        document.getElementById('closeFoodModalBtn').onclick = () => closeModal('foodEditModal');
        document.getElementById('saveMealEditBtn').onclick = saveMealEdit;
        document.getElementById('closeMealModalBtn').onclick = () => closeModal('mealEditModal');
        document.getElementById('searchRecipeBtn').onclick = searchRecipes;
        document.getElementById('closeRecipeModalBtn').onclick = () => closeModal('recipeModal');
        document.getElementById('foodSearchInput').addEventListener('input', (e) => showAutocomplete(e.target.value));
        document.addEventListener('click', (e) => { if(!e.target.closest('.food-search-row')) document.getElementById('autocompleteList').style.display = 'none'; });
    }

    // Календарь и задачи
    function renderCalendar(){
        const y = currentCalendarDate.getFullYear(), m = currentCalendarDate.getMonth();
        const fd = new Date(y,m,1).getDay(), dim = new Date(y,m+1,0).getDate();
        let html = `<div style="display:flex;justify-content:space-between;"><button id="prevMonthBtn" style="background:none;border:none;color:#5D9BFF;">◀</button><span>${currentCalendarDate.toLocaleString('ru',{month:'long',year:'numeric'})}</span><button id="nextMonthBtn" style="background:none;border:none;color:#5D9BFF;">▶</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;">Пн Вт Ср Чт Пт Сб Вс</div><div class="calendar-grid" id="calendarGrid"></div>`;
        document.getElementById('calendarWidget').innerHTML = html;
        const grid = document.getElementById('calendarGrid');
        let so = fd===0 ? 6 : fd-1, day = 1;
        for(let i=0;i<42;i++){
            if(i<so || day>dim){
                let e = document.createElement('div'); e.className='cal-day'; e.style.opacity='0.3'; grid.appendChild(e);
            } else {
                let ds = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let hasTasks = tasks[ds] && tasks[ds].some(t=>!t.done);
                let btn = document.createElement('div');
                btn.className = `cal-day ${selectedDateStr===ds ? 'selected' : ''} ${hasTasks ? 'task-exists' : ''}`;
                btn.innerText = day;
                btn.onclick = (function(ds){ return function(){ selectDate(ds); }; })(ds);
                grid.appendChild(btn);
                day++;
            }
        }
        document.getElementById('prevMonthBtn').onclick = () => { currentCalendarDate.setMonth(currentCalendarDate.getMonth()-1); renderCalendar(); };
        document.getElementById('nextMonthBtn').onclick = () => { currentCalendarDate.setMonth(currentCalendarDate.getMonth()+1); renderCalendar(); };
    }
    function selectDate(ds){ selectedDateStr = ds; renderCalendar(); renderTasksForDate(); }
    function renderTasksForDate(){
        const container = document.getElementById('taskList');
        const dayTasks = tasks[selectedDateStr] || [];
        if(dayTasks.length===0){ container.innerHTML = '<div style="text-align:center;">Нет задач</div>'; return; }
        let html = '';
        dayTasks.forEach((t,i)=>{
            html += `<div class="task-item ${t.done?'completed':''}"><input type="checkbox" class="task-check" ${t.done?'checked':''} data-idx="${i}"><span class="task-text">${escapeHtml(t.text)}</span><button class="task-del" data-idx="${i}"><i class="fas fa-trash-alt"></i></button></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.task-check').forEach(cb => {
            cb.onchange = async (e) => {
                let idx = parseInt(e.target.dataset.idx);
                tasks[selectedDateStr][idx].done = e.target.checked;
                await saveTasks(currentUser.uid);
                renderTasksForDate();
                renderCalendar();
            };
        });
        document.querySelectorAll('.task-del').forEach(btn => {
            btn.onclick = async (e) => {
                let idx = parseInt(btn.dataset.idx);
                tasks[selectedDateStr].splice(idx,1);
                if(tasks[selectedDateStr].length===0) delete tasks[selectedDateStr];
                await saveTasks(currentUser.uid);
                renderTasksForDate();
                renderCalendar();
            };
        });
    }
    async function addTask(){
        let text = document.getElementById('newTaskText').value.trim();
        if(!text) return;
        if(!tasks[selectedDateStr]) tasks[selectedDateStr] = [];
        tasks[selectedDateStr].push({text, done:false});
        await saveTasks(currentUser.uid);
        document.getElementById('newTaskText').value = '';
        renderTasksForDate();
        renderCalendar();
    }

    // Продукты
    function showAutocomplete(query){
        const listDiv = document.getElementById('autocompleteList');
        if(!query.trim() || customFoods.length===0){ listDiv.style.display='none'; return; }
        const matches = customFoods.filter(f=>f.name.toLowerCase().includes(query.toLowerCase())).slice(0,5);
        if(matches.length===0){ listDiv.style.display='none'; return; }
        let html = '';
        matches.forEach(f=>{ html += `<div class="autocomplete-item" data-name="${escapeHtml(f.name)}" data-kcal="${f.kcalPer100g}">${escapeHtml(f.name)} — ${f.kcalPer100g} ккал/100г</div>`; });
        listDiv.innerHTML = html;
        listDiv.style.display = 'block';
        document.querySelectorAll('.autocomplete-item').forEach(el=>{
            el.onclick = () => {
                prepareAddProduct(el.dataset.name, parseFloat(el.dataset.kcal));
                listDiv.style.display='none';
                document.getElementById('foodSearchInput').value='';
            };

    function renderFoodList(){
        const container = document.getElementById('foodList');
        if(currentFoods.length===0){ container.innerHTML = '<div style="color:#9AA6BF;">Добавьте продукты</div>'; return; }
        let html = '';
        currentFoods.forEach((f,idx)=>{
            html += `<div class="food-item"><span class="food-info">${escapeHtml(f.name)} — ${f.grams}г = ${Math.round(f.kcal)} ккал</span><div><button class="food-edit" data-idx="${idx}"><i class="fas fa-pen"></i></button><button class="food-delete" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button></div></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.food-edit').forEach(btn=>{ btn.onclick = (e)=>{ let idx=parseInt(btn.dataset.idx); openFoodEditModal(idx); }; });
        document.querySelectorAll('.food-delete').forEach(btn=>{ btn.onclick = (e)=>{ let idx=parseInt(btn.dataset.idx); currentFoods.splice(idx,1); renderFoodList(); updateTotalCalories(); }; });
        updateTotalCalories();

    function updateTotalCalories(){ let total = currentFoods.reduce((s,f)=>s+f.kcal,0); document.getElementById('totalCalories').innerHTML = `🔥 ${Math.round(total)} ккал (всего)`; }
    function openFoodEditModal(index=null){
        editFoodIndex = index;
        const title = document.getElementById('foodEditTitle');
        if(index!==null){
            title.innerText = 'Редактировать продукт';
            const f = currentFoods[index];
            document.getElementById('editFoodName').value = f.name;
            document.getElementById('editFoodGrams').value = f.grams;
            document.getElementById('editFoodKcalPer100g').value = Math.round(f.kcal / f.grams * 100);
        } else {
            title.innerText = 'Добавить продукт';
            document.getElementById('editFoodName').value = '';
            document.getElementById('editFoodGrams').value = '100';

    function saveFoodFromModal(){
        const name = document.getElementById('editFoodName').value.trim();
        const grams = parseFloat(document.getElementById('editFoodGrams').value);
        const kcalPer100g = parseFloat(document.getElementById('editFoodKcalPer100g').value);
        if(!name || isNaN(grams) || grams<=0 || isNaN(kcalPer100g) || kcalPer100g<0){ alert('Введите корректные данные'); return; }
        const kcal = (kcalPer100g * grams / 100);
        const product = {name, grams, kcal};
        if(editFoodIndex!==null) currentFoods[editFoodIndex] = product;
        else currentFoods.push(product);
        renderFoodList();
        closeModal('foodEditModal');
        editFoodIndex = null;

    function closeModal(id){ document.getElementById(id).style.display = 'none'; }
    async function searchFoodOnline(){
        const query = document.getElementById('foodSearchInput').value.trim();
        if(!query) return;
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ищем...';
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent('https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(query)+'&search_simple=1&action=process&json=1&page_size=5')}`;
        try{
            const resp = await fetch(proxy);
            const data = await resp.json();
            const content = JSON.parse(data.contents);
            if(content.products && content.products.length){
                let html = '<strong>Найденные продукты:</strong><ul>';
                for(let p of content.products){
                    let name = p.product_name_ru || p.product_name || p.generic_name || 'Без названия';
                    let kcal = p.nutriments?.['energy-kcal_100g'] || p.nutriments?.energy_kcal_100g || 0;
                    if(kcal>0 && name && name!=='Без названия'){
                        html += `<li style="cursor:pointer;margin-bottom:5px;" onclick="prepareAddProduct('${escapeHtml(name)}', ${kcal})">${escapeHtml(name)} — ${kcal} ккал/100г</li>`;
                    }
                }
                html += '</ul>';
                resultsDiv.innerHTML = html;
            } else { resultsDiv.innerHTML = 'Ничего не найдено'; }
        } catch(e){ resultsDiv.innerHTML = 'Ошибка поиска'; }
    }

        document.getElementById('searchResults').innerHTML = '';

    async function logData(){
        let date = document.getElementById('trackerDate').value;
        if(!date) date = getTodayStr();
        let weight = parseFloat(document.getElementById('weightInput').value);
        let steps = parseInt(document.getElementById('stepsInput').value);
        if(!isNaN(weight)){
            weightLog = weightLog.filter(w=>w.date!==date);
            weightLog.push({date, weight});
            await saveWeightEntry(currentUser.uid, date, weight);
        }
        if(!isNaN(steps)){
            stepsLog = stepsLog.filter(s=>s.date!==date);
            stepsLog.push({date, steps});
            await saveStepsEntry(currentUser.uid, date, steps);
        }
        document.getElementById('weightInput').value = '';
        document.getElementById('stepsInput').value = '';
        updateChart();
    }
    function updateChart(){
        const last30 = [];
        for(let i=29;i>=0;i--){ let d=new Date(); d.setDate(d.getDate()-i); last30.push(d.toISOString().slice(0,10)); }

        let stepsData = last30.map(ds=>{ let e=stepsLog.find(s=>s.date===ds); return e?e.steps/1000:null; });
        const ctx = document.getElementById('progressChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type:'line',
            data:{ labels:last30.map(d=>d.slice(5)), datasets:[{label:'Вес (кг)',data:weightData,borderColor:'#FFB347',tension:0.2},{label:'Шаги (тыс.)',data:stepsData,borderColor:'#5D9BFF',tension:0.2}] },
            options:{ responsive:true, maintainAspectRatio:true }
        });
    }

    // Меню
    const breakfasts = [{name:"Овсянка с ягодами (300г)", weight:300, kcal:360},{name:"Омлет из 3 яиц (220г)", weight:220, kcal:380},{name:"Творог 2% с бананом (250г)", weight:250, kcal:280},{name:"Гречневая каша с молоком (280г)", weight:280, kcal:340},{name:"Сырники (200г)", weight:200, kcal:420},{name:"Яичница с беконом (250г)", weight:250, kcal:450},{name:"Пшенная каша с тыквой (300г)", weight:300, kcal:310},{name:"Рисовая каша кокосовая (280г)", weight:280, kcal:380},{name:"Бутерброд с авокадо (150г)", weight:150, kcal:350},{name:"Смузи шпинатный (400мл)", weight:400, kcal:320}];
    const secondBreakfasts = [{name:"Яблоко (150г)", weight:150, kcal:80},{name:"Банан (120г)", weight:120, kcal:105},{name:"Греческий йогурт (150г)", weight:150, kcal:120},{name:"Миндаль (30г)", weight:30, kcal:180},{name:"Творожный сырок (50г)", weight:50, kcal:110},{name:"Апельсин (180г)", weight:180, kcal:85},{name:"Кефир 1% (250мл)", weight:250, kcal:100},{name:"Протеиновый батончик (50г)", weight:50, kcal:200},{name:"Морковь с хумусом (150г)", weight:150, kcal:180},{name:"Огуречный салат (200г)", weight:200, kcal:50}];

    const afternoonSnacks = [{name:"Творог 2% (150г)", weight:150, kcal:150},{name:"Кефир 1% (200мл)", weight:200, kcal:80},{name:"Грецкие орехи (30г)", weight:30, kcal:195},{name:"Яблоко (150г)", weight:150, kcal:80},{name:"Протеиновый коктейль (300мл)", weight:300, kcal:150},{name:"Морковные палочки (150г)", weight:150, kcal:60},{name:"Рисовые хлебцы с сыром (50г)", weight:50, kcal:140},{name:"Запеченное яблоко (200г)", weight:200, kcal:120},{name:"Смузи клубничный (300мл)", weight:300, kcal:160},{name:"Ореховая смесь (40г)", weight:40, kcal:240}];
    const dinners = [{name:"Рыба на пару с овощами (350г)", weight:350, kcal:380},{name:"Запеченные овощи с курицей (350г)", weight:350, kcal:420},{name:"Творожная запеканка (300г)", weight:300, kcal:390},{name:"Салат с креветками (300г)", weight:300, kcal:350},{name:"Гречка с грибами (350г)", weight:350, kcal:320},{name:"Овощное рагу с тофу (400г)", weight:400, kcal:310},{name:"Куриные котлеты с пюре (400г)", weight:400, kcal:500},{name:"Фаршированный перец (400г)", weight:400, kcal:520},{name:"Стейк из индейки (350г)", weight:350, kcal:450},{name:"Ленивые голубцы (400г)", weight:400, kcal:480}];
    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    async function generateWeeklyPlan(){
        if(!userProfile || !userProfile.targetCalories){ alert('Сначала заполните профиль (кнопка "Профиль")'); return; }
        const wk = getWeekKey(currentWeekStart);
        let bf = shuffle([...breakfasts]), sb = shuffle([...secondBreakfasts]), lu = shuffle([...lunches]), as = shuffle([...afternoonSnacks]), di = shuffle([...dinners]);
        let plan = [];
        let target = userProfile.targetCalories;
        for(let i=0;i<7;i++){
            let breakfast = bf[i % bf.length];
            let secondBreakfast = sb[i % sb.length];
            let lunch = lu[i % lu.length];
            let afternoonSnack = as[i % as.length];
            let dinner = di[i % di.length];  // исправлено: было di[i % dinner.length]
            let total = breakfast.kcal + secondBreakfast.kcal + lunch.kcal + afternoonSnack.kcal + dinner.kcal;
            if(total > target+200){
                let factor = target/total;
                lunch.weight = Math.max(200, Math.floor(lunch.weight * factor));
                lunch.kcal = Math.floor(lunch.kcal * factor);
            } else if(total < target-200){
                let factor = target/total;
                lunch.weight = Math.min(600, Math.floor(lunch.weight * factor));
                lunch.kcal = Math.floor(lunch.kcal * factor);
            }
            plan.push({
                breakfast: {name:breakfast.name, weight:breakfast.weight, calories:breakfast.kcal},
                secondBreakfast: {name:secondBreakfast.name, weight:secondBreakfast.weight, calories:secondBreakfast.kcal},
                lunch: {name:lunch.name, weight:lunch.weight, calories:lunch.kcal},
                afternoonSnack: {name:afternoonSnack.name, weight:afternoonSnack.weight, calories:afternoonSnack.kcal},
                dinner: {name:dinner.name, weight:dinner.weight, calories:dinner.kcal}
            });
        }
        await saveWeeklyMeal(currentUser.uid, wk, plan);
    }
    async function renderCurrentWeekMenu(){
        const wk = getWeekKey(currentWeekStart);
        const start = getStartOfWeek(currentWeekStart);
        const days = [];
        for(let i=0;i<7;i++){ let d=new Date(start); d.setDate(start.getDate()+i); days.push(d.toISOString().slice(0,10)); }
        document.getElementById('weekRange').innerText = `${days[0]} – ${days[6]}`;
        let plan = weeklyMeals[wk];
        if(!plan){ document.getElementById('weeklyMealPlan').innerHTML = '<div style="text-align:center;">Нет меню. Нажми "Сгенерировать"</div>'; return; }
        let html = '';
        const mealLabels = {breakfast:'Завтрак (08:00)', secondBreakfast:'Второй завтрак (11:00)', lunch:'Обед (14:00)', afternoonSnack:'Полдник (17:00)', dinner:'Ужин (20:00)'};
        for(let i=0;i<days.length;i++){
            let dp = plan[i];
            if(dp){
                html += `<div class="day-plan"><div class="day-title">📅 ${days[i]}</div>`;
                for(let [type,label] of Object.entries(mealLabels)){
                    let meal = dp[type];
                    html += `<div class="meal-row"><span class="meal-name">🍴 ${label}: ${escapeHtml(meal.name)} (${meal.weight} г, ${meal.calories} ккал)</span><button class="meal-edit" data-dayidx="${i}" data-meal="${type}"><i class="fas fa-pen"></i></button></div>`;
                }
                let total = (dp.breakfast?.calories||0)+(dp.secondBreakfast?.calories||0)+(dp.lunch?.calories||0)+(dp.afternoonSnack?.calories||0)+(dp.dinner?.calories||0);
                html += `<div style="color:#FFB347;">🔥 Итого: ${total} ккал</div></div>`;
            } else { html += `<div class="day-plan"><div class="day-title">${days[i]}</div><div>Нет плана</div></div>`; }
        }
        document.getElementById('weeklyMealPlan').innerHTML = html;
        document.querySelectorAll('.meal-edit').forEach(btn=>{
            btn.onclick = () => {
                let dayIdx = parseInt(btn.dataset.dayidx);
                let mealType = btn.dataset.meal;
                openMealEditModal(wk, dayIdx, mealType);
            };
        });
    }
    function openMealEditModal(weekKey, dayIdx, mealType){
        currentEditMeal = {weekKey, dayIdx, mealType};
        let meal = weeklyMeals[weekKey][dayIdx][mealType] || {name:'', weight:200, calories:300};
        document.getElementById('mealEditName').value = meal.name;
        document.getElementById('mealEditWeight').value = meal.weight;
        document.getElementById('mealEditCalories').value = meal.calories;
        document.getElementById('mealEditModal').style.display = 'flex';
    }
    async function saveMealEdit(){
        if(!currentEditMeal) return;
        const name = document.getElementById('mealEditName').value.trim();
        const weight = parseFloat(document.getElementById('mealEditWeight').value);
        const calories = parseFloat(document.getElementById('mealEditCalories').value);
        if(!name || isNaN(weight) || weight<=0 || isNaN(calories) || calories<0){ alert('Введите корректные данные'); return; }
        let plan = weeklyMeals[currentEditMeal.weekKey];
        if(plan && plan[currentEditMeal.dayIdx]){
            plan[currentEditMeal.dayIdx][currentEditMeal.mealType] = {name, weight, calories};
            await saveWeeklyMeal(currentUser.uid, currentEditMeal.weekKey, plan);
        }
        closeModal('mealEditModal');
        currentEditMeal = null;
    }
    async function searchRecipes(){
        let q = document.getElementById('recipeSearchQuery').value.trim();
        if(!q) return;
        const resDiv = document.getElementById('recipeResultsList');
        resDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ищем...';
        try{
            const url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(q)}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if(data.meals){
                let html = '<strong>Выберите рецепт:</strong><ul>';
                for(let meal of data.meals){
                    html += `<li style="margin-bottom:8px;cursor:pointer;" onclick="selectRecipeName('${escapeHtml(meal.strMeal)}')">${escapeHtml(meal.strMeal)}</li>`;
                }
                html += '</ul>';
                resDiv.innerHTML = html;
            } else { resDiv.innerHTML = 'Не найдено'; }

            document.getElementById('mealEditName').value = name;
            alert(`Название "${name}" вставлено. Теперь укажите вес и калории.`);

    const adviceList = ["🚶‍♂️ 5000 шагов в день","💧 Пей воду за 20 минут до еды","😴 Спи 7-8 часов","🍗 Белок в каждый приём","🏋️ Лестница вместо лифта","🍎 5 приёмов пищи помогают не голодать","📏 Взвешивай порции","🔥 Дефицит 500 ккал/день = минус 0.5 кг в неделю"];
    function randomAdvice(){ document.getElementById('dailyAdvice').innerHTML = `<i class="fas fa-star-of-life"></i> ${adviceList[Math.floor(Math.random()*adviceList.length)]}`; }

    function renderAuth(){
        document.getElementById('app').innerHTML = `
            <div class="auth-container">
                <h2><i class="fas fa-dragon"></i> Трансформатор 3.5</h2>
                <div id="authForm">
                    <input type="email" id="email" placeholder="Email" autocomplete="off" autocomplete="new-password">
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Пароль" autocomplete="new-password">
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                    <button id="loginBtn">Войти</button>
                    <button id="clearFormBtn" style="background:#555;">Очистить форму</button>
                    <div class="switch" id="toRegister">Нет аккаунта? Зарегистрироваться</div>
                    <div class="forgot" id="forgotPassword">Забыли пароль?</div>
                    <hr style="margin:15px 0">
                    <button id="anonymousBtn" style="background:#2E3D52;">Войти без регистрации (анонимно)</button>
                </div>
                <div id="profileForm" style="display:none">
                    <input type="number" id="weight" placeholder="Вес (кг)" step="0.1">
                    <input type="number" id="height" placeholder="Рост (см)">
                    <input type="number" id="age" placeholder="Возраст">
                    <select id="activity">
                        <option value="low">Малоподвижный</option>
                        <option value="medium">Умеренно активный</option>
                        <option value="high">Очень активный</option>
                    </select>
                    <select id="goal">
                        <option value="lose">Похудеть</option>
                        <option value="maintain">Поддерживать</option>
                        <option value="gain">Набрать массу</option>
                    </select>
                    <select id="gender">
                        <option value="male">Мужской</option>
                        <option value="female">Женский</option>
                    </select>
                    <button id="saveProfileBtn">Сохранить и начать</button>
                </div>
            </div>
        `;
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch(e){ alert('Ошибка входа: '+e.message); }
        };
        document.getElementById('toRegister').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password){ alert('Введите email и пароль'); return; }
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                document.getElementById('authForm').style.display = 'none';
                document.getElementById('profileForm').style.display = 'block';
            } catch(e){ alert('Ошибка регистрации: '+e.message); }
        };
        document.getElementById('forgotPassword').onclick = async () => {
            const email = document.getElementById('email').value;
            if(!email){ alert('Введите email'); return; }
            try {
                await auth.sendPasswordResetEmail(email);
                alert('Письмо отправлено на '+email);
            } catch(e){ alert('Ошибка: '+e.message); }
        };
        document.getElementById('clearFormBtn').onclick = () => {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        };
        document.getElementById('anonymousBtn').onclick = async () => {
            try {
                await auth.signInAnonymously();
            } catch(e){ alert('Ошибка анонимного входа: '+e.message); }
        };
        document.getElementById('togglePassword').onclick = () => {
            const pwd = document.getElementById('password');
            if(pwd.type === 'password'){ pwd.type = 'text'; } else { pwd.type = 'password'; }
        };
        document.getElementById('saveProfileBtn').onclick = async () => {
            const user = auth.currentUser;
            if(!user) return;
            const profile = {
                weight: parseFloat(document.getElementById('weight').value),
                height: parseFloat(document.getElementById('height').value),
                age: parseInt(document.getElementById('age').value),
                activity: document.getElementById('activity').value,
                goal: document.getElementById('goal').value,
                gender: document.getElementById('gender').value
            };
            if(!profile.weight || !profile.height || !profile.age){ alert('Заполните все поля'); return; }
            profile.targetCalories = calculateCalories(profile);
            await db.collection('users').doc(user.uid).set(profile);
            userProfile = profile;
            currentUser = user;
            await loadUserData(user.uid);
            renderMainApp();
        };
    }

    auth.onAuthStateChanged(async (user) => {
        if(user){
            currentUser = user;
            await loadUserData(user.uid);
            if(userProfile || !user.isAnonymous){
                renderMainApp();
            } else {
                renderMainApp();
            }
        } else {
            renderAuth();
        }
    });
