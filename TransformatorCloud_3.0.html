<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Алексей — Трансформатор Cloud 3.0</title>
    <!-- Отключаем запрос favicon, чтобы не было 404 -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0B1120 0%, #19212E 100%);
            color: #E8EDF5;
            padding: 1rem;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 1.5rem; text-align: center; }
        .header h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #FFFFFF, #A5B9FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .card {
            background: rgba(22, 32, 48, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid rgba(72, 92, 120, 0.3);
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 4px solid #5D9BFF;
            padding-left: 12px;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin: 10px 0; }
        .cal-day { background: #1E2A3A; padding: 8px 4px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; }
        .cal-day.selected { background: #5D9BFF; }
        .task-list { max-height: 150px; overflow-y: auto; margin: 10px 0; }
        .task-item { display: flex; align-items: center; gap: 8px; background: #111A26; padding: 6px 12px; border-radius: 60px; margin-bottom: 6px; }
        .task-item.completed .task-text { text-decoration: line-through; opacity: 0.6; }
        .task-text { flex: 1; font-size: 0.85rem; }
        .add-task-form { display: flex; gap: 8px; margin-top: 8px; }
        .add-task-form input { flex:1; background: #0F1622; border: 1px solid #2E3D52; padding: 8px; border-radius: 40px; color:white; }
        .add-task-form button { background: #5D9BFF; border: none; padding: 0 16px; border-radius: 40px; color:white; cursor: pointer; }
        
        .food-search-row { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        .food-search-row input { flex:2; background: #0F1622; border: 1px solid #2E3D52; padding: 8px; border-radius: 40px; color:white; }
        .food-search-row button { background: #5D9BFF; border: none; padding: 0 16px; border-radius: 40px; cursor: pointer; }
        .food-list { max-height: 200px; overflow-y: auto; margin: 10px 0; }
        .food-item { display: flex; justify-content: space-between; background: #1E2A3A; padding: 5px 10px; border-radius: 30px; margin-bottom: 4px; align-items: center; }
        .food-edit-btn, .food-delete-btn { background: none; border: none; color: #FFB347; cursor: pointer; margin-left: 6px; }
        .total-calories { font-weight: bold; background: #2E3D52; padding: 8px; border-radius: 40px; text-align: center; margin: 8px 0; }
        .suggest-recipe-btn { background: #FFB347; border: none; padding: 10px; border-radius: 40px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; }
        
        .tracker-input { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tracker-input input { flex:1; background: #0F1622; border: 1px solid #2E3D52; padding: 8px; border-radius: 40px; color:white; }
        .tracker-input button { background: #5D9BFF; border: none; padding: 0 16px; border-radius: 40px; }
        canvas { max-height: 180px; margin-top: 10px; }
        
        .meal-plan-grid { max-height: 400px; overflow-y: auto; margin: 10px 0; }
        .day-plan { background: #0F1622; border-radius: 20px; padding: 10px; margin-bottom: 12px; }
        .day-title { color: #FFB347; font-weight: bold; margin-bottom: 6px; }
        .meal-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; background: #1E2A3A; padding: 5px 10px; border-radius: 40px; }
        .meal-name { flex:1; }
        .meal-edit { background: none; border: none; color: #5D9BFF; cursor: pointer; margin-left: 8px; }
        .generate-plan-btn { background: #5D9BFF; border: none; padding: 12px; border-radius: 60px; width: 100%; margin-top: 8px; font-weight: bold; cursor: pointer; }
        .advice-box { background: #0F1622; padding: 1rem; border-radius: 24px; margin-top: 8px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index:1000; }
        .modal-content { background: #1E2A3A; border-radius: 28px; padding: 1.5rem; width: 90%; max-width: 500px; }
        .modal-content input, .modal-content select { width: 100%; margin: 8px 0; padding: 8px; border-radius: 40px; border: none; background: #0F1622; color:white; }
        .modal-content button { margin-top: 12px; background: #5D9BFF; border: none; padding: 8px; border-radius: 40px; cursor: pointer; }
        @media (min-width: 768px) {
            body { padding: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-cloud-sun"></i> Трансформатор Cloud 3.0</h1>
        <p>Поиск продуктов (CORS fix) | Редактирование меню | Синхронизация</p>
        <div id="authStatus" style="font-size:0.7rem; margin-top:5px;">Подключение...</div>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> Задачи</div>
            <div id="calendarWidget"></div>
            <div id="taskList" class="task-list"></div>
            <div class="add-task-form">
                <input type="text" id="newTaskText" placeholder="Новая задача">
                <button id="addTaskBtn"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-calculator"></i> Калькулятор калорий</div>
            <div class="food-search-row">
                <input type="text" id="foodSearchInput" placeholder="Поиск продукта (например, ряженка)">
                <button id="searchFoodBtn"><i class="fas fa-search"></i> Найти</button>
            </div>
            <div id="searchResults" style="font-size:0.8rem; margin-bottom:8px;"></div>
            <div id="foodList" class="food-list"></div>
            <div id="totalCalories" class="total-calories">🔥 0 ккал</div>
            <button id="addCustomProductBtn" class="suggest-recipe-btn" style="background:#2E3D52;"><i class="fas fa-plus"></i> Добавить свой продукт</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Вес и шаги</div>
            <div class="tracker-input">
                <input type="number" id="weightInput" placeholder="Вес (кг)" step="0.1">
                <input type="number" id="stepsInput" placeholder="Шаги">
                <button id="logDataBtn"><i class="fas fa-save"></i> Записать</button>
            </div>
            <canvas id="progressChart" width="400" height="180"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 1.2rem;">
        <div class="card-title"><i class="fas fa-calendar-week"></i> План питания на неделю</div>
        <div id="weeklyMealPlan" class="meal-plan-grid"></div>
        <button id="generateMealPlanBtn" class="generate-plan-btn"><i class="fas fa-magic"></i> Сгенерировать новое меню</button>
        <div style="margin-top:8px; text-align:center;">
            <button id="prevWeekBtn" style="background:#2E3D52; border:none; padding:6px 12px; border-radius:40px;">◀ Пред. неделя</button>
            <span id="weekRange" style="margin:0 12px;">Текущая неделя</span>
            <button id="nextWeekBtn" style="background:#2E3D52; border:none; padding:6px 12px; border-radius:40px;">След. неделя ▶</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-brain"></i> Совет дня</div>
        <div class="advice-box" id="dailyAdvice"></div>
        <button id="refreshAdvice" style="margin-top: 12px; background: #2E3D52; border: none; padding: 8px; border-radius: 60px; width:100%; cursor:pointer;">🔄 Другой совет</button>
    </div>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <h3>Редактировать продукт</h3>
        <input type="text" id="editProductName" placeholder="Название">
        <input type="number" id="editProductKcal" placeholder="ккал на 100г">
        <button id="saveProductBtn">Сохранить</button>
        <button id="closeModalBtn" style="background:#555;">Отмена</button>
    </div>
</div>

<div id="recipeModal" class="modal">
    <div class="modal-content">
        <h3>Выбрать рецепт</h3>
        <input type="text" id="recipeSearchQuery" placeholder="Поиск рецепта...">
        <button id="searchRecipeBtn">Искать в интернете</button>
        <div id="recipeResultsList" style="max-height:200px; overflow-y:auto; margin-top:10px;"></div>
        <button id="closeRecipeModalBtn" style="background:#555;">Отмена</button>
    </div>
</div>

<script>
    // ========== FIREBASE ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDYfZrjWuDKkrx4aod7rfw--muqnq_X36g",
        authDomain: "transformatoralexey.firebaseapp.com",
        projectId: "transformatoralexey",
        storageBucket: "transformatoralexey.firebasestorage.app",
        messagingSenderId: "14371043469",
        appId: "1:14371043469:web:8f8154621a6bb1eae2cac4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let currentUserId = null;
    let currentWeekStart = new Date();
    let tasks = {};
    let weightLog = [];
    let stepsLog = [];
    let weeklyMeals = {};
    let customFoods = [];

    function getStartOfWeek(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = (day === 0 ? 6 : day - 1);
        d.setDate(d.getDate() - diff);
        d.setHours(0,0,0,0);
        return d;
    }
    function getWeekKey(date) {
        const start = getStartOfWeek(date);
        const year = start.getFullYear();
        const weekNum = Math.ceil((((start - new Date(year, 0, 1)) / 86400000) + 1) / 7);
        return `${year}-W${weekNum}`;
    }
    function getTodayStr() { return new Date().toISOString().slice(0,10); }

    async function loadCustomFoods() {
        if(!currentUserId) return;
        const snapshot = await db.collection('users').doc(currentUserId).collection('customFoods').get();
        customFoods = [];
        snapshot.forEach(doc => customFoods.push(doc.data()));
        renderFoodList();
    }
    async function saveCustomFood(food) {
        if(!currentUserId) return;
        const id = food.name.toLowerCase().replace(/\s/g, '_');
        await db.collection('users').doc(currentUserId).collection('customFoods').doc(id).set(food);
        customFoods.push(food);
        renderFoodList();
    }

    async function loadAllData() {
        if(!currentUserId) return;
        const tasksSnap = await db.collection('users').doc(currentUserId).collection('tasks').get();
        tasks = {};
        tasksSnap.forEach(doc => { tasks[doc.id] = doc.data().items || []; });
        const weightSnap = await db.collection('users').doc(currentUserId).collection('weight').get();
        weightLog = [];
        weightSnap.forEach(doc => weightLog.push({date: doc.id, weight: doc.data().weight}));
        const stepsSnap = await db.collection('users').doc(currentUserId).collection('steps').get();
        stepsLog = [];
        stepsSnap.forEach(doc => stepsLog.push({date: doc.id, steps: doc.data().steps}));
        const mealsSnap = await db.collection('users').doc(currentUserId).collection('weeklyMeals').get();
        weeklyMeals = {};
        mealsSnap.forEach(doc => { weeklyMeals[doc.id] = doc.data().plan; });
        await loadCustomFoods();
        renderCalendar();
        renderTasksForDate(getTodayStr());
        updateChart();
        renderCurrentWeekMenu();
    }

    async function saveTasks() {
        if(!currentUserId) return;
        for(let date in tasks) {
            await db.collection('users').doc(currentUserId).collection('tasks').doc(date).set({items: tasks[date]});
        }
    }
    async function saveWeightEntry(date, weight) { await db.collection('users').doc(currentUserId).collection('weight').doc(date).set({weight}); }
    async function saveStepsEntry(date, steps) { await db.collection('users').doc(currentUserId).collection('steps').doc(date).set({steps}); }
    async function saveWeeklyMeal(weekKey, plan) {
        await db.collection('users').doc(currentUserId).collection('weeklyMeals').doc(weekKey).set({plan});
        weeklyMeals[weekKey] = plan;
        renderCurrentWeekMenu();
    }

    // КАЛЕНДАРЬ
    let currentCalendarDate = new Date();
    let selectedDateStr = getTodayStr();

    function renderCalendar() {
        const year = currentCalendarDate.getFullYear();
        const month = currentCalendarDate.getMonth();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        let html = `<div style="display:flex; justify-content:space-between;">
                        <button id="prevMonthBtn" style="background:none; border:none; color:#5D9BFF;">◀</button>
                        <span>${currentCalendarDate.toLocaleString('ru', {month:'long', year:'numeric'})}</span>
                        <button id="nextMonthBtn" style="background:none; border:none; color:#5D9BFF;">▶</button>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center;">Пн Вт Ср Чт Пт Сб Вс</div>
                    <div class="calendar-grid" id="calendarGrid"></div>`;
        document.getElementById('calendarWidget').innerHTML = html;
        const grid = document.getElementById('calendarGrid');
        let startOffset = (firstDay === 0 ? 6 : firstDay-1);
        let day = 1;
        for(let i=0; i<42; i++) {
            if(i < startOffset || day > daysInMonth) {
                let empty = document.createElement('div');
                empty.className = 'cal-day';
                empty.style.opacity = '0.3';
                grid.appendChild(empty);
            } else {
                let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let hasTasks = tasks[dateStr] && tasks[dateStr].some(t => !t.done);
                let btn = document.createElement('div');
                btn.className = `cal-day ${selectedDateStr === dateStr ? 'selected' : ''} ${hasTasks ? 'task-exists' : ''}`;
                btn.innerText = day;
                btn.addEventListener('click', (function(ds){ return function(){ selectDate(ds); } })(dateStr));
                grid.appendChild(btn);
                day++;
            }
        }
        document.getElementById('prevMonthBtn')?.addEventListener('click', () => { currentCalendarDate.setMonth(currentCalendarDate.getMonth()-1); renderCalendar(); });
        document.getElementById('nextMonthBtn')?.addEventListener('click', () => { currentCalendarDate.setMonth(currentCalendarDate.getMonth()+1); renderCalendar(); });
    }

    function selectDate(dateStr) {
        selectedDateStr = dateStr;
        renderCalendar();
        renderTasksForDate();
    }

    function renderTasksForDate() {
        const container = document.getElementById('taskList');
        const dayTasks = tasks[selectedDateStr] || [];
        if(dayTasks.length === 0) { container.innerHTML = '<div style="text-align:center;">Нет задач</div>'; return; }
        let html = '';
        dayTasks.forEach((task, idx) => {
            html += `<div class="task-item ${task.done ? 'completed' : ''}">
                        <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} data-idx="${idx}">
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <button class="task-del" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.task-check').forEach(cb => {
            cb.addEventListener('change', async (e) => {
                let idx = parseInt(e.target.dataset.idx);
                tasks[selectedDateStr][idx].done = e.target.checked;
                await saveTasks();
                renderTasksForDate();
                renderCalendar();
            });
        });
        document.querySelectorAll('.task-del').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                let idx = parseInt(btn.dataset.idx);
                tasks[selectedDateStr].splice(idx,1);
                if(tasks[selectedDateStr].length === 0) delete tasks[selectedDateStr];
                await saveTasks();
                renderTasksForDate();
                renderCalendar();
            });
        });
    }

    async function addTask() {
        let text = document.getElementById('newTaskText').value.trim();
        if(!text) return;
        if(!tasks[selectedDateStr]) tasks[selectedDateStr] = [];
        tasks[selectedDateStr].push({text, done: false});
        await saveTasks();
        document.getElementById('newTaskText').value = '';
        renderTasksForDate();
        renderCalendar();
    }

    // ПРОДУКТЫ
    let currentFoods = [];
    function renderFoodList() {
        const container = document.getElementById('foodList');
        if(currentFoods.length === 0) { container.innerHTML = '<div style="color:#9AA6BF;">Добавьте продукты</div>'; }
        else {
            let html = '';
            currentFoods.forEach((f, idx) => {
                html += `<div class="food-item">${f.name} ${f.grams}г — ${Math.round(f.kcal)} ккал <button class="food-delete-btn" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button></div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.food-delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let idx = parseInt(btn.dataset.idx);
                    currentFoods.splice(idx,1);
                    renderFoodList();
                    updateTotalCalories();
                });
            });
        }
        updateTotalCalories();
    }
    function updateTotalCalories() {
        let total = currentFoods.reduce((sum, f) => sum + f.kcal, 0);
        document.getElementById('totalCalories').innerHTML = `🔥 ${Math.round(total)} ккал (всего)`;
    }

    // НОВЫЙ ПРОКСИ ДЛЯ ПОИСКА ПРОДУКТОВ (corsproxy.io)
    document.getElementById('searchFoodBtn').addEventListener('click', async () => {
        const query = document.getElementById('foodSearchInput').value.trim();
        if(!query) return;
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ищем...';
        try {
            const targetUrl = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=8`;
            const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            const resp = await fetch(proxyUrl);
            const text = await resp.text();
            const content = JSON.parse(text);
            if(content.products && content.products.length) {
                let html = '<strong>Найденные продукты:</strong><ul style="margin-top:5px;">';
                for(let p of content.products) {
                    let name = p.product_name_ru || p.product_name || p.generic_name || 'Без названия';
                    let kcal = p.nutriments?.['energy-kcal_100g'] || p.nutriments?.energy_kcal_100g || 0;
                    if(kcal > 0 && name && name !== 'Без названия') {
                        html += `<li style="cursor:pointer; margin-bottom:5px;" onclick="addFoundProduct('${escapeHtml(name)}', ${kcal})">${escapeHtml(name)} — ${kcal} ккал/100г</li>`;
                    }
                }
                html += '</ul>';
                if(html.indexOf('cursor:pointer') === -1) html += '<li>Подходящих продуктов с калориями не найдено</li>';
                resultsDiv.innerHTML = html;
            } else {
                resultsDiv.innerHTML = 'Ничего не найдено. Попробуйте другое слово.';
            }
        } catch(e) { resultsDiv.innerHTML = 'Ошибка поиска. Проверьте интернет.'; console.error(e); }
    });
    window.addFoundProduct = function(name, kcalPer100g) {
        const grams = 100;
        const kcal = (kcalPer100g * grams / 100);
        currentFoods.push({name, grams, kcal});
        renderFoodList();
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('foodSearchInput').value = '';
    };
    document.getElementById('addCustomProductBtn').addEventListener('click', () => {
        let name = prompt('Название продукта:');
        if(!name) return;
        let kcal = parseFloat(prompt('Калорий на 100 грамм:'));
        if(isNaN(kcal)) return;
        saveCustomFood({name, kcalPer100g: kcal});
        alert('Продукт добавлен в личную базу. Теперь его можно найти через поиск.');
    });

    // ТРЕКЕР
    let chart;
    async function logData() {
        let weight = parseFloat(document.getElementById('weightInput').value);
        let steps = parseInt(document.getElementById('stepsInput').value);
        let today = getTodayStr();
        if(!isNaN(weight)) {
            weightLog = weightLog.filter(w => w.date !== today);
            weightLog.push({date: today, weight});
            await saveWeightEntry(today, weight);
        }
        if(!isNaN(steps)) {
            stepsLog = stepsLog.filter(s => s.date !== today);
            stepsLog.push({date: today, steps});
            await saveStepsEntry(today, steps);
        }
        document.getElementById('weightInput').value = '';
        document.getElementById('stepsInput').value = '';
        updateChart();
    }
    function updateChart() {
        const last7 = [];
        for(let i=6; i>=0; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            last7.push(d.toISOString().slice(0,10));
        }
        let weightData = last7.map(ds => { let e = weightLog.find(w => w.date === ds); return e ? e.weight : null; });
        let stepsData = last7.map(ds => { let e = stepsLog.find(s => s.date === ds); return e ? e.steps/1000 : null; });
        const ctx = document.getElementById('progressChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: last7.map(d => d.slice(5)),
                datasets: [
                    { label: 'Вес (кг)', data: weightData, borderColor: '#FFB347', tension: 0.2 },
                    { label: 'Шаги (тыс.)', data: stepsData, borderColor: '#5D9BFF', tension: 0.2 }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true }
        });
    }

    // НЕДЕЛЬНОЕ МЕНЮ
    async function renderCurrentWeekMenu() {
        const weekKey = getWeekKey(currentWeekStart);
        const startDate = getStartOfWeek(currentWeekStart);
        const days = [];
        for(let i=0; i<7; i++) {
            let d = new Date(startDate);
            d.setDate(startDate.getDate() + i);
            days.push(d.toISOString().slice(0,10));
        }
        document.getElementById('weekRange').innerText = `${days[0]} – ${days[6]}`;
        let plan = weeklyMeals[weekKey];
        if(!plan) {
            document.getElementById('weeklyMealPlan').innerHTML = '<div style="text-align:center;">Нет меню. Нажми "Сгенерировать"</div>';
            return;
        }
        let html = '';
        for(let i=0; i<days.length; i++) {
            let dayPlan = plan[i];
            if(dayPlan) {
                html += `<div class="day-plan">
                            <div class="day-title">📅 ${days[i]}</div>
                            <div class="meal-row">
                                <span class="meal-name">🍳 Завтрак: ${escapeHtml(dayPlan.breakfast)}</span>
                                <button class="meal-edit" data-dayidx="${i}" data-meal="breakfast"><i class="fas fa-pen"></i></button>
                            </div>
                            <div class="meal-row">
                                <span class="meal-name">🍗 Обед: ${escapeHtml(dayPlan.lunch)}</span>
                                <button class="meal-edit" data-dayidx="${i}" data-meal="lunch"><i class="fas fa-pen"></i></button>
                            </div>
                            <div class="meal-row">
                                <span class="meal-name">🌙 Ужин: ${escapeHtml(dayPlan.dinner)}</span>
                                <button class="meal-edit" data-dayidx="${i}" data-meal="dinner"><i class="fas fa-pen"></i></button>
                            </div>
                            <div style="color:#FFB347;">🔥 ${dayPlan.total} ккал</div>
                        </div>`;
            } else {
                html += `<div class="day-plan"><div class="day-title">${days[i]}</div><div>Нет плана</div></div>`;
            }
        }
        document.getElementById('weeklyMealPlan').innerHTML = html;
        document.querySelectorAll('.meal-edit').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let dayIdx = parseInt(btn.dataset.dayidx);
                let mealType = btn.dataset.meal;
                openRecipeModal(weekKey, dayIdx, mealType);
            });
        });
    }

    let currentEditWeekKey, currentEditDayIdx, currentEditMealType;
    function openRecipeModal(weekKey, dayIdx, mealType) {
        currentEditWeekKey = weekKey;
        currentEditDayIdx = dayIdx;
        currentEditMealType = mealType;
        document.getElementById('recipeModal').style.display = 'flex';
        document.getElementById('recipeResultsList').innerHTML = '';
        document.getElementById('recipeSearchQuery').value = '';
    }
    document.getElementById('searchRecipeBtn').addEventListener('click', async () => {
        const query = document.getElementById('recipeSearchQuery').value.trim();
        if(!query) return;
        const resultsDiv = document.getElementById('recipeResultsList');
        resultsDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ищем...';
        try {
            const url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`;
            const resp = await fetch(url);
            const data = await resp.json();
            if(data.meals) {
                let html = '<strong>Выберите рецепт:</strong><ul>';
                for(let meal of data.meals) {
                    html += `<li style="margin-bottom:8px; cursor:pointer;" onclick="selectRecipe('${escapeHtml(meal.strMeal)}')">${escapeHtml(meal.strMeal)}</li>`;
                }
                html += '</ul>';
                resultsDiv.innerHTML = html;
            } else {
                resultsDiv.innerHTML = 'Рецептов не найдено. Попробуйте другое слово.';
            }
        } catch(e) { resultsDiv.innerHTML = 'Ошибка поиска'; console.error(e); }
    });
    window.selectRecipe = async function(recipeName) {
        let plan = weeklyMeals[currentEditWeekKey];
        if(plan && plan[currentEditDayIdx]) {
            plan[currentEditDayIdx][currentEditMealType] = recipeName;
            plan[currentEditDayIdx].total = 400 + 500 + 350;
            await saveWeeklyMeal(currentEditWeekKey, plan);
            renderCurrentWeekMenu();
        }
        document.getElementById('recipeModal').style.display = 'none';
    };
    document.getElementById('closeRecipeModalBtn').addEventListener('click', () => {
        document.getElementById('recipeModal').style.display = 'none';
    });
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        document.getElementById('productModal').style.display = 'none';
    });

    async function generateWeeklyPlan() {
        const weekKey = getWeekKey(currentWeekStart);
        const breakfasts = ["Овсянка", "Омлет", "Творог с ягодами", "Гречневая каша", "Яичница с помидорами"];
        const lunches = ["Курица с гречкой", "Рис с курицей", "Салат с тунцом", "Индейка с овощами", "Суп куриный"];
        const dinners = ["Рыба на пару", "Творог", "Овощное рагу", "Запеченные овощи", "Куриное филе"];
        let plan = [];
        for(let i=0; i<7; i++) {
            let breakfast = breakfasts[Math.floor(Math.random() * breakfasts.length)];
            let lunch = lunches[Math.floor(Math.random() * lunches.length)];
            let dinner = dinners[Math.floor(Math.random() * dinners.length)];
            let total = 400 + 500 + 350;
            plan.push({breakfast, lunch, dinner, total});
        }
        await saveWeeklyMeal(weekKey, plan);
    }

    const adviceList = ["🚶‍♂️ 5000 шагов в день", "💧 Пей воду", "😴 Спи 7-8 часов", "🍗 Белок в каждый приём", "🏋️ Лестница вместо лифта"];
    function randomAdvice() { document.getElementById('dailyAdvice').innerHTML = `<i class="fas fa-star-of-life"></i> ${adviceList[Math.floor(Math.random() * adviceList.length)]}`; }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }

    auth.signInAnonymously().catch(err => console.error(err));
    auth.onAuthStateChanged(async (user) => {
        if(user) {
            currentUserId = user.uid;
            document.getElementById('authStatus').innerHTML = `✅ Синхронизация активна (ID: ${user.uid.slice(0,6)}...)`;
            await loadAllData();
            currentWeekStart = getStartOfWeek(new Date());
            renderCurrentWeekMenu();
        } else {
            document.getElementById('authStatus').innerHTML = '❌ Ошибка. Перезагрузи страницу.';
        }
    });

    document.getElementById('addTaskBtn').addEventListener('click', addTask);
    document.getElementById('logDataBtn').addEventListener('click', logData);
    document.getElementById('generateMealPlanBtn').addEventListener('click', generateWeeklyPlan);
    document.getElementById('refreshAdvice').addEventListener('click', randomAdvice);
    document.getElementById('newTaskText').addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });
    document.getElementById('prevWeekBtn').addEventListener('click', () => {
        currentWeekStart.setDate(currentWeekStart.getDate() - 7);
        renderCurrentWeekMenu();
    });
    document.getElementById('nextWeekBtn').addEventListener('click', () => {
        currentWeekStart.setDate(currentWeekStart.getDate() + 7);
        renderCurrentWeekMenu();
    });

    randomAdvice();
</script>
</body>
</html>
